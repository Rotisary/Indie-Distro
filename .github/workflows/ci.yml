name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Indie-Distro
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: Indie-Distro/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black isort pytest pytest-django

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Isort
        run: isort --check-only .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: indie_distro_test
          POSTGRES_USER: indie_user
          POSTGRES_PASSWORD: indie_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U indie_user -d indie_distro_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: Indie-Distro
    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DEBUG: "false"
      USE_MEMORY_DATABASE: "false"
      POSTGRES_NAME: indie_distro_test
      POSTGRES_USER: indie_user
      POSTGRES_PASSWORD: indie_pass
      POSTGRES_HOST: 127.0.0.1
      DJANGO_POSTGRES_PORT: "5432"
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6379"
      CELERY_BROKER: redis://127.0.0.1:6379/0
      CELERY_BACKEND: redis://127.0.0.1:6379/1
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-jwt-secret' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: Indie-Distro/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django

      - name: Run tests
        run: pytest -q
