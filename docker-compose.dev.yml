version: "3.9"

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env.dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery_worker:
    build: .
    command: celery -A config worker -l info -Q beats,io,transcoding,packaging,service,email-notification
    env_file:
      - .env.dev
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - web

  celery_beat:
    build: .
    command: celery -A config beat -l info
    env_file:
      - .env.dev
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - web
